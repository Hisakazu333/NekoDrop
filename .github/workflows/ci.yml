name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            libxdo-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            wget

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Run frontend helper tests
        run: |
          node --test apps/desktop/test/*.test.*
          npm run test:security-audit

      - name: Build frontend
        run: npm run build

      - name: Audit npm runtime dependencies
        run: npm audit --omit=dev

      - name: Audit supported dependency graph
        run: npm run security:audit

      - name: Check whitespace errors
        run: git diff --check
